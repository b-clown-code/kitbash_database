name: Nightly Graph Integrity Sweep

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  graph-sweep:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger graph integrity sweep
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.VERCEL_APP_URL }}/api/admin/nightly-graph-sweep" \
            --max-time 120)

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')

          echo "Response: $body"
          echo "HTTP Code: $http_code"

          if [ "$http_code" -ne 200 ]; then
            echo "❌ Graph integrity sweep failed"
            exit 1
          fi

          echo "✅ Graph integrity sweep succeeded"

      - name: Report failure
        if: failure()
        run: echo "❌ Check Vercel logs for /api/admin/nightly-graph-sweep"